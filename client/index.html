<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>室內設計繪圖 · Interior Designer</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div id="app">
      <!-- top bar -->
      <header id="topbar">
        <span class="brand">🏠 室內設計繪圖</span>
        <input id="projectName" class="proj-name" value="未命名平面圖" />
        <div class="spacer"></div>
        <button data-act="new">新建</button>
        <button data-act="save">儲存</button>
        <button data-act="open">開啟</button>
        <button data-act="import-image" title="匯入底圖以描繪（可調整位置、大小、透明度）">🖼️ 底圖</button>
        <span class="sep"></span>
        <button data-act="undo" title="復原 (Ctrl+Z)">↶ 復原</button>
        <button data-act="redo" title="重做 (Ctrl+Shift+Z)">重做 ↷</button>
        <span class="sep"></span>
        <button data-act="export-png">匯出 PNG</button>
        <button data-act="export-pdf">匯出 PDF</button>
        <button data-act="schedule" title="房間面積清單與家具估價">📋 清單</button>
        <button data-act="shortcuts" title="鍵盤快捷鍵">⌨</button>
        <span class="sep"></span>
        <button id="btnToggle">🧊 切換 3D 檢視</button>
        <select id="timeOfDay" class="time-select" title="光線時段">
          <option value="morning">🌅 早晨</option>
          <option value="noon" selected>☀️ 正午</option>
          <option value="dusk">🌆 黃昏</option>
          <option value="night">🌙 夜晚</option>
        </select>
        <span class="sep"></span>
        <label class="chk"><input type="checkbox" id="snapToggle" checked /> 吸附</label>
        <span id="zoomLabel" class="zoom">100%</span>
      </header>

      <div id="body">
        <!-- left: tools + furniture -->
        <aside id="left">
          <div id="tools" class="palette"></div>
          <div class="panel-title">家具庫</div>
          <div id="furniture" class="furniture-grid"></div>
        </aside>

        <!-- center canvas -->
        <main id="stage">
          <div id="pane2d" class="pane full">
            <canvas id="canvas"></canvas>
            <div class="pane-tag">2D</div>
            <div id="hint" class="hint"></div>
          </div>
          <div id="view3d" class="pane view3d pip">
            <div class="pane-tag">3D</div>
            <div id="hint3d" class="hint">WASD 移動 · Q/E 升降 · Shift 加速 · 拖曳旋轉 · 滾輪縮放</div>
          </div>
        </main>

        <!-- right: layers + properties -->
        <aside id="right">
          <div id="pipSlot"></div>
          <div class="panel-title">樓層</div>
          <div id="floors"></div>
          <div class="panel-title">圖層</div>
          <div id="layers"></div>
          <div class="panel-title">屬性</div>
          <div id="properties"><div class="muted">未選取物件</div></div>
        </aside>
      </div>
    </div>

    <!-- open-project modal -->
    <div id="modal" class="modal hidden">
      <div class="modal-box">
        <div class="modal-head"><span>開啟專案</span><button data-act="close-modal">✕</button></div>
        <div id="projectList" class="project-list"></div>
      </div>
    </div>

    <!-- schedule / cost modal -->
    <div id="scheduleModal" class="modal hidden">
      <div class="modal-box">
        <div class="modal-head"><span>清單與估價</span><button data-act="close-schedule">✕</button></div>
        <div id="scheduleBody" class="schedule-body"></div>
      </div>
    </div>

    <!-- keyboard shortcuts modal -->
    <div id="shortcutsModal" class="modal hidden">
      <div class="modal-box">
        <div class="modal-head"><span>鍵盤快捷鍵</span><button data-act="close-shortcuts">✕</button></div>
        <div class="shortcuts">
          <div><kbd>V</kbd> 選取　<kbd>H</kbd> 平移　<kbd>N</kbd> 窗　<kbd>M</kbd> 尺寸</div>
          <div><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> 2D 平移視角 / 3D 飛行</div>
          <div><kbd>Q</kbd>/<kbd>E</kbd> 3D 升降　<kbd>Shift</kbd> 加速</div>
          <div><kbd>⌘/Ctrl</kbd>+<kbd>C</kbd> / <kbd>V</kbd> / <kbd>D</kbd> 複製 / 貼上 / 直接複製</div>
          <div><kbd>⌘/Ctrl</kbd>+<kbd>Z</kbd> 復原　+<kbd>Shift</kbd> 重做</div>
          <div><kbd>方向鍵</kbd> 微移　+<kbd>Shift</kbd> 移動一格</div>
          <div><kbd>Delete</kbd> 刪除　<kbd>Esc</kbd> 取消 / 回到選取</div>
          <div>畫牆自動貼合牆端點；近水平/垂直/45° 對齊格線（<kbd>Shift</kbd> 強制）</div>
        </div>
      </div>
    </div>

    <input id="imageInput" type="file" accept="image/*" style="display:none" />
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
